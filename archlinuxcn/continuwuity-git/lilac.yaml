maintainers:
  - github: Kimiblock

pre_build_script: |
  aur_pre_build
  vcs_update
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()

update_on:
  - source: "gitea"
    gitea: "continuwuation/continuwuity"
    host: "forgejo.ellis.link"
    lilac_throttle: 1d
  - source: alpm
    alpm: zstd
    provided: libzstd.so
    strip_release: true
  - source: alpm
    alpm: jemalloc
    provided: libjemalloc.so
    strip_release: true
build_prefix: extra-x86_64
