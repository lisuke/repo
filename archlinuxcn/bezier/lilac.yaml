maintainers:
  - github: CoelacanthusHex
    email: coelacanthus@archlinuxcn.org

build_prefix: extra-x86_64

pre_build_script: |
  aur_pre_build(maintainers=['carlosal1015'])
  add_depends(['libgfortran.so'])

post_build: aur_post_build

update_on:
  - source: aur
    aur: bezier
  - source: alpm
    alpm: gcc-fortran
  - source: alpm
    alpm: libgfortran
    provided: libgfortran.so
